<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man Utd Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .btn-primary {
            background-color: #DA291C;
            border-color: #DA291C;
        }

        .btn-primary:hover {
            background-color: #b91e12;
            border-color: #b91e12;
        }

        .btn-primary:focus,
        .btn-primary:focus-visible {
            background-color: #DA291C;
            border-color: #b91e12;
            box-shadow: 0 0 0 0.25rem rgba(218, 41, 28, 0.5);
        }

        h1 {

</head>

<body>

<h1 class="text-center my-4">Man Utd Official Merchandise</h1>



<!-- CREATE CONTAINER FOR DYNAMIC CONTENT -->
    <!-- This container will hold the dynamically generated cards. -->
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-md-4">
                <label for="category-filter" class="form-label">Filter by Category:</label>
                <select id="category-filter" class="form-select">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>
        <div id="content-container" class="row g-4"></div>
    </div>

<!-- CREATE HTML TEMPLATE FOR CARDS -->
    <!-- The <template> element defines a reusable HTML structure that is not rendered on the page initially. -->
    <!-- JavaScript will clone this template for each item in the data array and fill in the content dynamically. -->
    <!-- This keeps your code DRY (Don't Repeat Yourself) - you define the structure once and reuse it many times. -->
    <template id="card-template">
        <div class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm">
                <img src="" class="card-img-top" alt="">
                <div class="card-body">
                    <h5 class="card-title"></h5>
                    <p class="card-text category text-muted small"></p>
                    <p class="card-text description"></p>
                    <p class="card-text fw-bold text-success"></p>
                    <a href="#" class="btn btn-primary">Order Now</a>
                </div>
            </div>
        </div>
    </template>

<!-- INCLUDE BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!-- INCLUDE AXIOS LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<!-- CREATE CUSTOM JS TO DYNAMICALLY RENDER CARDS -->
    <script>
    
    // DECLARE (SAMPLE) DATA FROM AN API OR DATABASE
        const data = [
            {
                title: "Dirty Laundry",
                description: "A large basket of dirty clothes that need to be washed.",
                image: "https://www.household-management-101.com/image-files/wicker-laundry-basket.jpg",
                price: 719.99,
                category: "women's clothing"
            },
            {
                title: "Undies of Doom",
                description: "Soiled, smells like poo. Someone please deal with this.",
                image: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjfjfAQDP4i3n6hcXpLojl_W7xXQf_PoCSuDDRi0huHZ24zwyoUNBTe7D06cz1eWaqt7FY08bQ8DHJhq4Oovg_JXxICiQeTf7O9dyGXT80ZvNePYKo1vr3vIYj3IFTLz-OAdSQZI9VdvJqT/s400/nasty+undies.jpg",
                price: 239.99,
                category: "men's clothing"
            }
        ];

        // FUNCTION TO RENDER CARDS DYNAMICALLY
    function renderItems(items) {
        const container = document.getElementById('content-container');
        const template = document.getElementById('card-template');

        items.forEach(item => {
            const clone = template.content.cloneNode(true);

            clone.querySelector('img').src = item.image || 'https://via.placeholder.com/300x200?text=No+Image';
            clone.querySelector('img').alt = item.title;
            clone.querySelector('.card-title').textContent = item.title;
            clone.querySelector('.category').textContent = item.category || '';
            clone.querySelector('.description').textContent = item.description || '';
            clone.querySelector('.fw-bold').textContent = item.price ? `$${item.price}` : '';
            clone.querySelector('.btn').href = item.link || item.url || '#';

            container.appendChild(clone);
        });
    }
        // NOTE: This line below is commented out because we now render both dummy data + API data together
        // after the API fetch completes, as per STEP 0c below.
        
        // renderItems(data);
    </script>


<!-- FUNCTION THAT ADDS NEW CARDS TO THE PAGE BASED ON FETCHED DATA -->

<script>
function addItem(productItem) {

   const template = document.getElementById("card-template").content.cloneNode(true);

   template.querySelector('img').src = productItem.image || 'https://via.placeholder.com/300x200?text=No+Image';
   template.querySelector('img').alt = productItem.title;
   template.querySelector('.card-title').textContent = productItem.title;
   template.querySelector('.category').textContent = productItem.category || '';
   template.querySelector('.description').textContent = productItem.description;
   template.querySelector('.fw-bold').textContent = productItem.price ? `$${productItem.price}` : '';


   document.querySelector('#content-container').appendChild(template);
} // close function addItem

 </script>

<!-- FILTERING BY CATEGORY FUNCTIONALITY -->
<script>

// STORE ALL PRODUCTS HERE FOR FILTERING
let allProducts = [];

// RENDER PRODUCTS TO PAGE
function renderProducts(products) {
    // Clear the container first
    document.getElementById('content-container').innerHTML = '';
    
    // Render each product
    products.forEach(item => {
        addItem({ title: item.title, description: item.description, price: item.price, image: item.image, category: item.category });
    });
}

// POPULATE DROPDOWN WITH UNIQUE CATEGORIES
function populateCategories(products) {
    const categories = [...new Set(products.map(p => p.category))];
    const select = document.getElementById('category-filter');
    
    categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        select.appendChild(option);
    });
}

// FILTER AND RENDER ON DROPDOWN CHANGE
document.getElementById('category-filter').addEventListener('change', (e) => {
    const selected = e.target.value;
    if (selected === 'all') {
        renderProducts(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.category === selected);
        renderProducts(filtered);
    }
});

 </script>




<!-- STEP 0: AXIOS GET AND POST REQUESTS -->
<!-- please note that this script needs to be at the bottom of the HTML because it relies on the DOM being fully loaded first. -->
<!-- defer won't work here it is only for external style sheets -->

<script>

// STEP 0a TEST: AXIOS GET REQUEST TO FETCH PRODUCT DATA FROM FAKESTOREAPI.COM
axios.get('/api/products')
.then(response => console.log(response.data))
// this is the response from the GET request, which includes an array of product objects. The response is logged to the console to verify that the data was fetched successfully.

// STEP 0b TEST: AXIOS POST REQUEST TO CREATE A NEW PRODUCT ON FAKESTOREAPI.COM

axios.post('/api/products',
{
title: 'Title of Product',
description: 'Description of Product',
price: 192.99,
category: 'clothing',
image: 'https://example.com/image.jpg'
})

// this is the response from the POST request, which includes the newly created product data. The response is logged to the console to verify that the product was created successfully.
.then(response => console.log(response.data))


// STEP 0c: FETCH PRODUCTS AND RENDER
// Fetch products from the API, combine with dummy data, populate the category dropdown, and render all products.
axios.get('/api/products').then((response) => {
    allProducts = [...data, ...response.data]; // Combine dummy data + API products into one array (dummy first)
    populateCategories(allProducts); // Fill the dropdown with unique category options
    renderProducts(allProducts); // Render all products (dummy + API) to the page
});

</script>

</body>

</html>
