<!-- This is a simple HTML file for the Socket Chat App.  -->

<!-- It includes the Socket.IO client library and a custom client.js script for handling chat functionality. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Socket Chat App!</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  
    <div class="container">
    <aside class="sidebar">
      <h2>Online Users</h2>
      <ul id="users"></ul>
    </aside>
 
    <main class="chat-area">
      <h1>Socket Chat App</h1>
      <div id="status"></div>
      <ul id="messages"></ul>
 
      <form id="chat-form">
        <input id="message-input" type="text"
               placeholder="Type a message..."
               autocomplete="off" />
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <!-- Socket.IO client library (auto-served by the server) -->
  <script src="/socket.io/socket.io.js"></script>
 
  <!-- Your own client-side JS -->
  <script src="/client.js"></script>
</body>
</html>
