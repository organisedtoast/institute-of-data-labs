<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man Utd Legends</title>

    <!-- STEP 1: INCLUDE BOOTRAP CSS -->
    <!-- The CDN (Content Delivery Network) link is used to load the Bootstrap CSS from a remote server, which can improve loading times and reduce the load on your own server. It also ensures that you are using a stable and widely used version of Bootstrap. -->
    <!-- Boostrap CSS provides a responsive grid system, pre-designed components, and utility classes that make it easier to create a visually appealing and responsive layout for the webpage. It helps in quickly styling the content without needing to write custom CSS from scratch. -->
    <!-- The integrity attribute is used to ensure that the file being loaded has not been tampered with. It provides a hash that the browser can use to verify the integrity of the file. The crossorigin attribute is used to handle CORS (Cross-Origin Resource Sharing) requests, allowing the browser to make requests for resources from different origins while maintaining security. -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- STEP 6: CUSTOM CSS FOR MAN UTD THEME -->
    <!-- Internal stylesheet to override Bootstrap's default button colors with Manchester United's iconic red. -->
    <style>
        /* Override Bootstrap's primary button background color to Man Utd red */
        .btn-primary {
            background-color: #DA291C; /* Manchester United official red */
            border-color: #DA291C;
        }

        /* Change button color on hover for visual feedback */
        .btn-primary:hover {
            background-color: #b91e12; /* Darker red on hover */
            border-color: #b91e12;
        }

        /* Change button color when focused (e.g., keyboard navigation) */
        .btn-primary:focus,
        .btn-primary:focus-visible {
            background-color: #DA291C;
            border-color: #b91e12;
            box-shadow: 0 0 0 0.25rem rgba(218, 41, 28, 0.5);
        }

        /* Change h1 color and make font size much larger */
        h1 {
            color: #7e120b; 
            font-size: 3rem;
        }

    </style>
</head>

<body>

<h1 class="text-center my-4">Man Utd Legends</h1>

    <!-- STEP 3: CONTENT CONTAINER -->
    <!-- This div is where JavaScript will inject the dynamically generated cards. -->
    <!-- The 'row' class creates a Bootstrap grid row, and 'g-4' adds spacing (gutters) between the cards. -->
    <div class="container py-5">
        <div id="content-container" class="row g-4"></div>
    </div>

    <!-- STEP 4: HTML TEMPLATE FOR CARDS -->
    <!-- The <template> element defines a reusable HTML structure that is not rendered on the page initially. -->
    <!-- JavaScript will clone this template for each item in the data array and fill in the content dynamically. -->
    <!-- This keeps your code DRY (Don't Repeat Yourself) - you define the structure once and reuse it many times. -->
    <template id="card-template">
        <!-- 'col-md-6 col-lg-4' makes the grid responsive: 2 cards per row on medium screens, 3 on large screens. -->
        <div class="col-md-6 col-lg-4">
            <!-- 'card' is a Bootstrap component for creating boxed content. -->
            <!-- 'h-100' makes all cards the same height, and 'shadow-sm' adds a subtle shadow for visual depth. -->
            <div class="card h-100 shadow-sm">
                <!-- Image placeholder - JavaScript will set the 'src' attribute to the actual image URL. -->
                <img src="" class="card-img-top" alt="">
                <div class="card-body">
                    <!-- Card title - JavaScript will insert the player's name here. -->
                    <h5 class="card-title"></h5>
                    <!-- Card text - JavaScript will insert the player's description here. -->
                    <p class="card-text"></p>
                    <!-- Button with Bootstrap styling - JavaScript will set the link destination. -->
                    <a href="#" class="btn btn-primary">Official Club Profile</a>
                </div>
            </div>
        </div>
    </template>

    <!-- STEP 2: INCLUDE BOOTSTRAP JS -->
    <!-- The Bootstrap JS bundle includes all the necessary JavaScript files for Bootstrap's interactive components, such as modals, dropdowns, tooltips, and more. By including this bundle, you can easily add interactivity to your webpage without needing to write custom JavaScript code for each component. -->
    <!-- The integrity attribute is used to ensure that the file being loaded has not been tampered with. It provides a hash that the browser can use to verify the integrity of the file. The crossorigin attribute is used to handle CORS (Cross-Origin Resource Sharing) requests, allowing the browser to make requests for resources from different origins while maintaining security. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- STEP 5: CUSTOM JAVASCRIPT FOR DYNAMIC RENDERING -->
    <!-- This script contains the data and logic to generate cards dynamically from an array. -->
    <script>
        // STEP 5.1: DEFINE THE DATA ARRAY
        // This array holds all the data for the cards. Each object represents one player card.
        
        const data = [
            {
                title: "Wayne Rooney",
                description: "A versatile 10 who combined workrate with technical skill, dropping deep to link play, finish and assist with efficiency.",
                image: "https://cdn1.unitedinfocus.com/uploads/14/2021/04/GettyImages-495528502.jpg",
                link: "https://www.manutd.com/en/players-and-staff/detail/wayne-rooney"
            },
            {
                title: "Cristiano Ronaldo",
                description: "An inter-generational wing forward, using pace, aerial ability and powerful shooting to terrorise defences. Football's best attacking player of the 21st century alongside Lionel Messi.",
                image: "https://cdn1.unitedinfocus.com/uploads/14/2022/10/GettyImages-1339668720-1024x649.jpg",
                link: "https://www.manutd.com/en/players-and-staff/detail/cristiano-ronaldo"
            },
            {
                title: "Sir Bobby Charlton",
                description: "A complete attacking midfielder with visionary passing and a thunderous shot, orchestrating play from deep positions.",
                image: "https://cdn1.unitedinfocus.com/uploads/14/2022/03/GettyImages-501985272.jpg",
                link: "https://www.manutd.com/en/players-and-staff/detail/sir-bobby-charlton"
            },
            {
                title: "Ryan Giggs",
                description: "A left winger whose close control, pace and longevity made him a constant threat down the flank for over two decades.",
                image: "https://cdn1.unitedinfocus.com/uploads/14/2023/03/GettyImages-1256270049-1024x683.jpg",
                link: "https://www.manutd.com/en/players-and-staff/detail/ryan-giggs"
            },
            {
                title: "Eric Cantona",
                description: "A robust yet charismatic number 10 who held up play, created chances with flair and scored spectacular goals.",
                image: "https://cdn1.unitedinfocus.com/uploads/14/2022/04/GettyImages-912539652.jpg",
                link: "https://www.manutd.com/en/players-and-staff/detail/eric-cantona"
            },
            {
                title: "Paul Scholes",
                description: "A technical midfielder with exceptional passing range and timing, controlling tempo and breaking lines with precision.",
                image: "https://cdn1.unitedinfocus.com/uploads/14/2019/11/GettyImages-1146387624.jpg",
                link: "https://www.manutd.com/en/players-and-staff/detail/paul-scholes"
            }
        ];

        // STEP 5.2: DEFINE THE RENDER FUNCTION
        // This function takes an array of items and creates a card for each one.
        function renderItems(items) {
            // Get the container element from the HTML where cards will be added.
            const container = document.getElementById('content-container');
            // Get the template element that defines the card structure.
            const template = document.getElementById('card-template');

            // Loop through each item in the data array.
            items.forEach(item => {
                // Clone the template content. 'true' means clone everything inside the template.
                const clone = template.content.cloneNode(true);
                
                // Find the <img> element in the cloned template and set its 'src' to the item's image URL.
                clone.querySelector('img').src = item.image;
                // Set the 'alt' text for accessibility (screen readers use this to describe the image).
                clone.querySelector('img').alt = item.title;
                
                // Find the element with class 'card-title' and set its text to the item's title.
                clone.querySelector('.card-title').textContent = item.title;
                // Find the element with class 'card-text' and set its text to the item's description.
                clone.querySelector('.card-text').textContent = item.description;
                
                // Find the button and set its 'href' to the item's link. '|| "#"' provides a fallback to '#' if no link exists.
                clone.querySelector('.btn').href = item.link || '#';
                
                // Append the fully populated card to the container, making it visible on the page.
                container.appendChild(clone);
            });
        }

        // STEP 5.3: INITIAL RENDER
        // Call the render function with the data array to display the cards when the page loads.
        renderItems(data);
    </script>
</body>

</html>
