<!DOCTYPE html>
<html lang="en">

<!-- STEP 4: CREATE A TEMPLATE FOR THE NEWS CARDS
The template element is used to define a reusable HTML structure for the news cards.
It contains placeholders for the news title and content, which will be dynamically populated with actual data. 
Nothing inside the template will be rendered on the page until it is cloned in Step 5.
-->

<!-- After we have defined the template, we can use JavaScript to clone its content and populate it with data from the newsFlow array.
This allows us to create multiple news cards based on the same structure without having to write redundant HTML code for each card.
-->

<!-- define a template for the news cards with id "news-template" -->
<template id="news-template">

<!-- style the "card" class to define the appearance of the news cards -->    
<div class="card col-8" style="width: 18rem; margin:10px">

<!-- style the "news-title" class to define the appearance of the news title -->    
<h5 class="news-title"></h5>

<!-- style the "news-body" class to define the appearance of the news body -->    
<div class="news-body">

</template>




<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Geopolitics v2</title>

    <!-- STEP 1: INCLUDE BOOTRAP CSS AS WELL AS CUSTOM STYLES -->
    
    <!-- Step 1a: include the Bootstrap CSS using a CDN link. -->
    <!-- The CDN (Content Delivery Network) link is used to load the Bootstrap CSS from a remote server, which can improve loading times and reduce the load on your own server. It also ensures that you are using a stable and widely used version of Bootstrap. -->
    <!-- Boostrap CSS provides a responsive grid system, pre-designed components, and utility classes that make it easier to create a visually appealing and responsive layout for the webpage. It helps in quickly styling the content without needing to write custom CSS from scratch. -->
    <!-- The integrity attribute is used to ensure that the file being loaded has not been tampered with. It provides a hash that the browser can use to verify the integrity of the file. The crossorigin attribute is used to handle CORS (Cross-Origin Resource Sharing) requests, allowing the browser to make requests for resources from different origins while maintaining security. -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


   <!-- Step 1b: include custom styles section to define additional CSS rules for the webpage. -->
   <!-- You may need this to make the news title larger and bolder than the default styling provided by Bootstrap. -->
   <style>
       .subtitle {
          font-size: 1.5rem;
            font-weight: bold;
       }

         .form-label {
            font-weight: bold;
         }

   </style>




</head>      


<body>

<h1 class="text-center my-4">🌍 Global Geopolitics News Monitor with mock JSON server data added on</h1>



<!-- STEP 6: CREATE A CONTAINER FOR THE NEWS CARDS -->
<div id="news-list" class="d-flex flex-wrap justify-content-center"></div>

<!-- STEP 7: CREATE A FORM TO ADD NEW NEWS ITEMS -->
<!-- This form allows users to submit new news items dynamically. It includes fields for the title and body, and a submit button. -->
<!-- The preventDefault method is used to stop the form from performing a normal POST request on submit, allowing us to handle the submission with JavaScript instead. -->
<form id="news-form" class="my-4 p-4 border rounded">
   <div class="mb-3">
      <p class="subtitle">TOP SECRET: SECURE SUBMIT GEOPOLITICAL NEWS</p>
      <label for="news-title" class="form-label">News Title</label>
      <input type="text" class="form-control" id="news-title" placeholder="Please enter title of geopolitical news" required>
   </div>
   <div class="mb-3">
      <label for="news-body" class="form-label">News Body</label>
      <textarea class="form-control" id="news-body" rows="3" placeholder="Please enter body of geopolitical news" required></textarea>
   </div>
   <button type="submit" class="btn btn-primary">Secure Submit</button>
</form>






   <script>
      // STEP 3: SIMULATE ASYNCHRONOUS DATA FETCHING
      // This function simulates fetching news data asynchronously, which is a common scenario when working with APIs.
      // It returns a promise that resolves with the news data after a delay of 1 second, mimicking the time it might take to receive a response from an API.
      // The newsFlow array contains objects representing different news items, each with a title and body.
      // This data will be used to populate the webpage with news content once it is fetched.

      // Step 3a: use const to declare a variable newsFlow and assign it an array of objects, where each object represents a news item with a title and body.
      const newsFlow = [
         { title: 'BREAKING: Israel launches decapitation strike on Iran ☠️💣', body: 'Israel has launched a surprise opportunistic daylight attack on the IRGC leadership, killing Supreme Leader Ayatollah Ali Khamenei and 30 top officials during a leadership meeting held at his underground Tehran complex.' },
         { title: 'BREAKING: US attacks Iran with aim of regime coercion ✈️💥', body: 'The United States has followed up with a series of airstrikes on Iranian military targets. President Donald Trump aims to coerce what remains of the IRGC leadership into abandoning their nuclear weapon & ballistic missile ambitions.' },
         { title: 'BREAKING: Iran retaliates against neighbours hosting US forces 🚀⚔️', body: 'Iran has responded with missile counterattacks against Israeli and US forces in the region. This included attacks on Bahrain, Jordan, Kuwait, Iraq, Qatar, Saudi Arabia and the United Arab Emirates.' },
         { title: 'BREAKING: EU to schedule leisurely meeting next month 🏖️🍹', body: 'The European Union may schedule a leisurely meeting next month after their holiday siesta has concluded. EU President Ursula von der Leyen plans to discuss the escalating conflict and devise a united diplomatic response that is politically acceptable to all members.' }
      ];

    // Step 3b: declare a function getNews that simulates fetching news data asynchronously. It returns a promise that resolves with the newsFlow data after a delay of 1 second.
      function getNews() {
        return new Promise(resolve => {
            setTimeout(function() {
               resolve(newsFlow)
            }, 1000)
         })
      }

      // Step 3c: call the getNews function and log the news data to the console once it is fetched. This demonstrates how to handle asynchronous data fetching using promises.
      getNews().then((news) => console.log(news))
   
   
   
// STEP 5: CREATE A FUNCTION TO ADD NEWS CARDS TO THE HTML PAGE (ALONGSIDE ADDING TEMPLATE?)
// This function takes a news item as an argument, clones the content of the news template, and populates it with the title and content from the news item.
// Finally, it appends the populated template to the news list on the webpage, allowing for dynamic addition of news cards based on the fetched data.

// Step 5a: declare a function addNews that takes a newsItem as an argument. 
// This function will be responsible for adding a news card to the HTML page based on the provided news item.
function addNews(newsItem) {

   // Step 5b: clone the content of the news template using document.getElementById and cloneNode. This creates a new instance of the template that can be modified without affecting the original template. 
   const template = document.getElementById("news-template").content.cloneNode(true);
   
   // Step 5c: populate the cloned template with the title and body from the news item. The querySelector method is used to select the elements within the template and set their innerText to the corresponding values from the news item.
   template.querySelector('.news-title').innerText = newsItem.title;
   template.querySelector('.news-body').innerText = newsItem.body;
    
   // Step 5d: append the populated template to the news list on the webpage. This allows the new news card to be displayed on the page dynamically based on the fetched data.
   document.querySelector('#news-list').appendChild(template);
} // close function addNews
   
   // Step 5e: call the addNews function for each news item in the newsFlow array.
   // This will dynamically add all the news cards to the HTML page based on the fetched data.
   getNews().then((news) => news.forEach(addNews));


   // Step 7b: add an event listener to the form to handle the submit event.
   // The preventDefault method is called to stop the form from performing a normal POST request.
   // Instead, we handle the submission with JavaScript to add the new news item dynamically.
   document.getElementById('news-form').addEventListener('submit', function(event) {
      event.preventDefault(); // prevent default form submission behavior
      
      // get the title and body from the form inputs
      const title = document.getElementById('news-title').value;
      const body = document.getElementById('news-body').value;
      
      // create a new news item object
      const newNewsItem = { title: title, body: body };
      
      // add the new news item to the page
      addNews(newNewsItem);
      
      // clear the form inputs
      document.getElementById('news-title').value = '';
      document.getElementById('news-content').value = '';
   });

   </script>


<!-- STEP 8: USE AXIOS TO FETCH AND POST DATA -->

<!-- Step 8a: include the Axios library using a CDN link. 
Axios is a popular JavaScript library used for making HTTP requests from the browser. 
It provides an easy-to-use API for sending asynchronous requests to APIs and handling responses. 
By including this script, we can use Axios to fetch and post data in our application. -->
<script
src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios
.min.js"></script>


<!-- Step 8b: use Axios to make a GET request to the JSONPlaceholder API to fetch a list of posts.
The response data is logged to the console, allowing us to see the fetched posts. -->

<script>
axios.get('https://jsonplaceholder.typicode.com/posts')
.then(response => console.log(response.data))


// Step 8c: use Axios to make a POST request to the JSONPlaceholder API to create a new post with a title, body, and userId. The response data from the POST request is also logged to the console, showing the newly created post.

axios.post('https://jsonplaceholder.typicode.com/posts',
{
title: 'The Studio',
body: 'Something funny',
userId: 1,
})

// Step 8d: log the response data from the POST request to the console, allowing us to see the details of the newly created post.
.then(response => console.log(response.data))

</script>

<!-- STEP 9: DISPLAY FETCHED POSTS FROM JSONPLACEHOLDER ON THE WEBPAGE -->
<!-- This step uses the data fetched from the JSONPlaceholder API and displays it on the webpage using the addNews function. -->

<!-- Step 9a: use Axios to make a GET request to the JSONPlaceholder API to fetch posts, then iterate through the response data. -->
<!-- For each post, call the addNews function to create a news card and display it on the page. -->


<script>
// Step 9e: wrap the axios GET request in a 3-second delay using setTimeout.
// A 3-second delay is added using setTimeout to ensure the local newsFlow array (1-second delay) displays first, followed by the API data.
setTimeout(() => {
   axios.get('https://jsonplaceholder.typicode.com/posts')
   .then(response => {
      
      // Step 9b: iterate through each post in the response data array.
      response.data.forEach(post => {
         // Step 9c: create a news item object with the title and body from the fetched post.
         const newsItem = { title: post.title, body: post.body };
         // Step 9d: call addNews to add the fetched post as a news card on the webpage.
         addNews(newsItem);
      });
   });
}, 3000); // 3-second delay
</script>

</body>

</html>
