<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Gossip Monitor</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">

</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Stock Gossip Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cards.html">Stock Cards</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="addcard.html">Add Stock</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h1 class="text-center my-4">Add Stock</h1>

    <form id="add-stock-form" class="row g-3">
        <div class="col-md-6">
            <label for="stock_code" class="form-label">Stock Code</label>
            <input type="text" class="form-control" id="stock_code" required>
        </div>
        <div class="col-md-6">
            <label for="name" class="form-label">Company Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>
        <div class="col-md-6">
            <label for="lenses_category" class="form-label">Lenses Category</label>
            <select class="form-select" id="lenses_category" required>
                <option value="">Select...</option>
                <option value="deep value">Deep Value</option>
                <option value="profitable growth">Profitable Growth</option>
                <option value="unprofitable growth">Unprofitable Growth</option>
                <option value="defensive yield">Defensive Yield</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="share_price" class="form-label">Share Price</label>
            <input type="number" step="0.01" class="form-control" id="share_price" required>
        </div>
        <div class="col-md-6">
            <label for="market_cap" class="form-label">Market Cap</label>
            <input type="number" step="0.01" class="form-control" id="market_cap" required>
        </div>
        <div class="col-md-6">
            <label for="roe" class="form-label">ROE</label>
            <input type="number" step="0.01" class="form-control" id="roe" required>
        </div>
        <div class="col-md-6">
            <label for="image" class="form-label">Image URL</label>
            <input type="url" class="form-control" id="image" placeholder="https://via.placeholder.com/300x200?text=No+Image">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Add Stock</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
document.getElementById('add-stock-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const newStock = {
        stock_code: document.getElementById('stock_code').value,
        name: document.getElementById('name').value,
        lenses_category: document.getElementById('lenses_category').value,
        share_price: parseFloat(document.getElementById('share_price').value),
        market_cap: parseFloat(document.getElementById('market_cap').value),
        roe: parseFloat(document.getElementById('roe').value),
        image: document.getElementById('image').value || 'https://via.placeholder.com/300x200?text=No+Image'};

    axios.post('http://localhost:3000/stocks', newStock)
        .then(response => {
            alert('Stock added successfully!');
            this.reset();
        })
        .catch(error => {
            console.error('Error adding stock:', error);
            alert('Error adding stock. Note: POST requires a backend server like json-server.');
        });
});

// NOTE: To test the POST request, you need to have a backend server running that can accept POST requests and update the data source (e.g., a JSON file or database). 
// For this exercise, use json-server to create a simple REST API based on a JSON file. Here's how you can set it up:

// Install json-server on the terminal by running the following command.
// 1) npm install json-server (this installs json-server locally in your project which is recommended for project dependencies)
// 2) npm install -g json-server (this installs json-server globally on your system, allowing you to run it from any directory)

// To run json-server, use the following command in your terminal:
// 1) npx json-server --watch db.json --port 3000 (if local installation)
// 2) json-server --watch db.json --port 3000 (if global installation)


// Then you can test the POST request by filling out the form and submitting it.
// The new stock will be added to the db.json file under the "stocks" array, and you should see a success alert if the POST request is successful.

</script>



</body>
</html>
