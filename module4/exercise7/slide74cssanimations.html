<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Animation</title>
    <style>
        p {
            animation-name: slidein;
            animation-duration: 17s;
            animation-iteration-count: 3;
            animation-delay: 1s;
            
        }

        @keyframes slidein {
            from {
                margin-left: 0%;
            }

            to {
                margin-left: 100%;
            }
        }      
    </style>
</head>

<body>
    <p>Hello World!</p>
</body>

</html>
