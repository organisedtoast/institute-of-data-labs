.card-image {

    height: auto;          /* Maintain aspect ratio */
    display: block;
    margin-top: 10px;
    border-radius: 4px;
}

.player-image {
    width: 30%;           /* 30% of original 110px width */
    height: auto;          /* Maintain aspect ratio */
}

.position-image {
    width: 70%;           /* Full width for position diagrams */
    height: auto;          /* Maintain aspect ratio */
}

        <!-- However, if we do that, we need to make sure that the script runs after the DOM has loaded, otherwise it will not be able to find the HTML template and card list elements. -->
        <!-- If it is an external script, this can be easily achieved by using defer attribute in the script tag -->
        <!-- However, given that we are writing the script directly in the HTML file, we will need to wrap our code in a DOMContentLoaded event listener to ensure that it runs after the DOM has fully loaded. -->

            // Step 2c: Define the addCard function
            // This function creates a new card with the given title, description, and optional image
            function addCard(title, text, imageUrl) {
                // Clone the template to create a new card
                const template = document.getElementById('card-template')
                    .content
                    .cloneNode(true);

                // Populate the cloned template with the provided data
                template.querySelector('.card-title').innerText = title;
                template.querySelector('.card-text').innerText = text;
                
                // If an image URL is provided, create and append an img element
                if (imageUrl) {
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.alt = title;
                    img.referrerPolicy = "no-referrer"; // this is used to bypass hotlinking restrictions that some websites may have on their images
                    
                    // this is a hardcoded rule used to add different classes to the image based on whether it is a player image or a position image from footballizer website, so that we can style them differently if needed
                    img.classList.add('card-image');
                    if (imageUrl.includes("footballizer")) {
                        img.classList.add("position-image");
                    } else {
                        img.classList.add("player-image");
                    }
                    template.querySelector('.card-body').appendChild(img);
                }

                // Append the populated card to the card-list container
                document.querySelector('#card-list').appendChild(template);
            }

            // Step 2d: Display cards for each player
            // Loop through each player and create cards using the addCard function
            players.forEach(player => {
                
                // Create header card for player name
                addCard('Player: ' + player.name, 'Key Details');
                
                // Create cards for each item in the player's portfolio
                player.portfolio.forEach(item => addCard(item.info, '', item.supportingimage));
            });

        });
    </script>
</head>

<body>
    <!-- STEP 3: HTML STRUCTURE -->
    <!-- Define the template and container where cards will be inserted -->

    <!-- Template: A blueprint for each card (not rendered until cloned by JS) -->
    <template id="card-template">
        <div class="card">
            <div class="card-body">
                <div class="card-title"></div>
                <div class="card-text"></div>
            </div>
        </div>
    </template>

    <!-- Container: Cards generated by JS will be appended here -->
    <div id="card-list"></div>
</body>
</html>
