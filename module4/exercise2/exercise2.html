<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Calculator</title>
    <!-- page title shown in browser tab -->

    <link rel="stylesheet" href="exercise2.css"> 
    <!-- link = this tag is used to link external resources -->    
    <!-- rel= = this attribute specifies the relationship between the current document and the linked resource -->
    <!-- "stylesheet" = indicates that the linked resource is a CSS stylesheet --> 
    <!-- href= = this attribute specifies the path to the CSS file -->
    <!-- "xxxxxx.css" = the CSS file is in the same directory as this HTML file. If it were in a subfolder called "styles", it would be "styles/xxxxxx.css" -->
    
    <script src="exercise2.js" defer></script> <!-- always put script link at the top for new starter/ AI friendliness. BUT MUST INSERT DEFER TO STOP JS ERRORS -->
    <!-- script = this tag is used to include JavaScript code or link to an external JavaScript file -->
    <!-- src= this attribute specifies the path to the JavaScript file -->
    <!-- "xxxxxx.js" = the JavaScript file is in the same directory as this HTML file. If it were in a subfolder called "scripts", it would be "scripts/xxxxxx.js" -->
    <!-- defer = this attribute tells the browser to only execute the script after the HTML document has been fully parsed. This is important because our JS code needs to access HTML elements first.
    If the JS runs before those elements are loaded, there will be an error. -->

</head>
<body>



<!-- Step 0a: Create application flow diagram for the calculator -->

<!-- Image of application flow diagram here: <a href="/institute-of-data-labs/module4/exercise2/calc_appflow.jpg" target="_blank">App Flow Diagram</a> -->

<!-- Step 0b: Create low-fidelity design for the calculator -->

<!-- Image of low-fidelity design here: <a href="/institute-of-data-labs/module4/exercise2/calc_lofidel.jpg" target="_blank">Low-Fidelity Design</a> -->

<!-- Step 0c: Create high-fidelity design for the calculator -->

<!-- Image of high-fidelity design here: <a href="/institute-of-data-labs/module4/exercise2/calc_hifidel.jpg" target="_blank">Final Design</a> -->


    <!-- Step 0c: Create div container with class "calculator-container" for the purposes of styling and layout -->
    <div class="calculator-container">
        
        <!-- Step 0c: Create a heading with class "calculator-title" and text. -->
        <h1 class="calculator-title">My Calculator</h1>
        
                 <!-- Step 0c: Create div container with class "display-container" for the purposes of styling just the input fields and result display -->          
                <div class="display-container">
            
            <!-- Step 1: CREATE INPUTS AREA-->

            
            <!-- Step 1a: create First Input-->
            <input type="number" id="first-number" class="input-display" placeholder="0" value="0">
            <!-- 
                - type="number": only allows numeric input
                - id: unique identifier for JavaScript to access this element
                - placeholder: shows hint text when empty
                - value="0": default value -->

            <!-- Step 1b: create Second Input-->
            <input type="number" id="second-number" class="input-display" placeholder="0" value="0">
            
            <!-- Step 2: CREATE RESULT DISPLAY AREA-->
            
            <!-- Step 2a: create div container with id "result-display" and class "result-display" -->
            <div id="result-display" class="result-display">
                
                <!-- Step 2b: Create span for = symbol with class "equals-symbol" -->
                <!-- a span is an inline element used for styling a part of the text --> 
                <span class="equals-symbol">=</span>
                
                <!-- Step 2c: Create span for result value with id "result-value" -->
                <!-- This is where the calculated result will be displayed. It starts at 0 and will be updated by JavaScript when the user clicks the = action button --> 
                <span id="result-value">0</span>

            </div>

        </div>

        <!-- Step 3: CREATE OPERATION BUTTONS AREA -->
 
        <!-- Step 3a: Create a div container with class "operation-buttons-row" to allow styling and layout -->
        <div class="operation-buttons-row">
            
            <!-- Step 3b: Create + Button with class "op-btn". Upon clicking, it calls selectOperation('+') -->
            <button class="op-btn" onclick="selectOperation('+')">+</button>
            
            <!-- Step 3c: Create - Button with class "op-btn". Upon clicking, it calls selectOperation('-') -->
            <button class="op-btn" onclick="selectOperation('-')">-</button>
            
            <!-- Step 3d: Create × Button with class "op-btn". Upon clicking, it calls selectOperation('×') -->
            <button class="op-btn" onclick="selectOperation('×')">×</button>
            
            <!-- Step 3e: Create ÷ Button with class "op-btn". Upon clicking, it calls selectOperation('÷') -->
            <button class="op-btn" onclick="selectOperation('÷')">÷</button>
        </div>
        
        <!-- Step 4: CREATE ACTION BUTTONS AREA -->

        <!-- Step 4a: Create a div container with class "action-buttons-row" to allow styling and layout -->
        <div class="action-buttons-row">
            
            <!-- Step 4b: Create = Button with class "equals-btn". Upon clicking, it calls calculate() -->
            <button id="equals-btn" class="equals-btn" onclick="calculate()">=</button>
            
            <!-- Step 4c: Create Reset Button with class "reset-btn". Upon clicking, it calls resetCalculator() -->
            <button id="reset-btn" class="reset-btn" onclick="resetCalculator()">Reset</button>
        </div>
        
        <!-- Step 5: CREATE STATUS MESSAGE AREA -->
        
        <!-- Step 5a: Create a div container with id "status-message" to display error messages or other status updates. This will be updated dynamically by JavaScript -->
        <!-- Apply class attribute "status-message" to allow styling and layout -->
        <div id="status-message" class="status-message"></div>
        
    </div>

</body>
</html>
