<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stock - Stock Cards Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .btn-primary {
            background-color: #DA291C;
            border-color: #DA291C;
        }

        .btn-primary:hover {
            background-color: #b91e12;
            border-color: #b91e12;
        }

        .btn-primary:focus,
        .btn-primary:focus-visible {
            background-color: #DA291C;
            border-color: #b91e12;
            box-shadow: 0 0 0 0.25rem rgba(218, 41, 28, 0.5);
        }

        h1 {
            color: #7e120b;
            font-size: 3rem;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Stock Cards Monitor</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cards.html">Stock Cards</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="addcard.html">Add Stock</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h1 class="text-center my-4">Add Stock</h1>

    <form id="add-stock-form" class="row g-3">
        <div class="col-md-6">
            <label for="stock_code" class="form-label">Stock Code</label>
            <input type="text" class="form-control" id="stock_code" required>
        </div>
        <div class="col-md-6">
            <label for="name" class="form-label">Company Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>
        <div class="col-md-6">
            <label for="lenses_category" class="form-label">Lenses Category</label>
            <select class="form-select" id="lenses_category" required>
                <option value="">Select...</option>
                <option value="deep value">Deep Value</option>
                <option value="profitable growth">Profitable Growth</option>
                <option value="unprofitable growth">Unprofitable Growth</option>
                <option value="defensive yield">Defensive Yield</option>
            </select>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Add Stock</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
document.getElementById('add-stock-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const newStock = {
        stock_code: document.getElementById('stock_code').value,
        name: document.getElementById('name').value,
        lenses_category: document.getElementById('lenses_category').value,
        share_price: parseFloat(document.getElementById('share_price').value),
        market_cap: parseFloat(document.getElementById('market_cap').value),
        roe: parseFloat(document.getElementById('roe').value),
        image: document.getElementById('image').value || 'https://via.placeholder.com/300x200?text=No+Image'};

    axios.post('db.json', newStock)
        .then(response => {
            alert('Stock added successfully!');
            this.reset();
        })
        .catch(error => {
            console.error('Error adding stock:', error);
            alert('Error adding stock. Note: POST requires a backend server like json-server.');
        });
});
</script>

</body>
</html>
